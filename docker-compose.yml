version: '3.8'

services:
  db:
    build:
      context: ./backend
      dockerfile: db/Dockerfile
    container_name: vf_mysql
    environment:
      MYSQL_ROOT_PASSWORD: "YourStrong!Passw0rd"
      MYSQL_DATABASE: "VolvemosFutbol"
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pYourStrong!Passw0rd"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vf_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=VolvemosFutbol;User=root;Password=YourStrong!Passw0rd;"
    ports:
      - "5186:5186"
    restart: unless-stopped
